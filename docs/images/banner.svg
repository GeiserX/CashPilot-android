<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/><line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Phone icon -->
  <g transform="translate(75, 45)">
    <rect x="0" y="0" width="50" height="90" rx="8" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <rect x="6" y="12" width="38" height="60" rx="2" fill="#ffffff" opacity="0.15"/>
    <circle cx="25" cy="82" r="4" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <!-- Android bot head -->
    <rect x="14" y="22" width="22" height="16" rx="8" fill="#ffffff" opacity="0.4"/>
    <circle cx="20" cy="28" r="2" fill="#f43f5e" opacity="0.8"/>
    <circle cx="30" cy="28" r="2" fill="#f43f5e" opacity="0.8"/>
    <line x1="16" y1="16" x2="19" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="34" y1="16" x2="31" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <text x="180" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1">
    CashPilot Android
  </text>

  <text x="182" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    Companion app monitoring passive income on your phone
  </text>

  <g transform="translate(770, 50)" opacity="0.15">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#ffffff">heartbeat: {</text>
    <text x="0" y="16" font-family="monospace" font-size="11" fill="#ffffff">  apps: 6</text>
    <text x="0" y="32" font-family="monospace" font-size="11" fill="#ffffff">  running: 5</text>
    <text x="0" y="48" font-family="monospace" font-size="11" fill="#ffffff">  tx: "42MB"</text>
    <text x="0" y="64" font-family="monospace" font-size="11" fill="#ffffff">}</text>
  </g>
</svg>
